name: Update SnapDog OS Installer release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Published vX.Y.Z SnapDog OS Installer tag
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: update-snapdog-os-installer-release
  cancel-in-progress: false

jobs:
  update:
    name: Validate links and open update PR
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.SNAPDOG_RELEASE_AUTOMATION_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Update release metadata from published assets
        env:
          GITHUB_TOKEN: ${{ secrets.SNAPDOG_RELEASE_AUTOMATION_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: node scripts/update-installer-release.mjs "$TAG"

      - name: Verify website
        run: |
          npm ci
          npm run docs:check
          npm run build

      - name: Create or update pull request and arm auto-merge
        env:
          GH_TOKEN: ${{ secrets.SNAPDOG_RELEASE_AUTOMATION_TOKEN }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/data/snapdog-os-installer-release.json; then
            echo "Website already references $TAG"
            exit 0
          fi

          BRANCH="automation/update-installer-release"
          git config user.name "snapdog-release-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/data/snapdog-os-installer-release.json
          git commit -m "chore: update SnapDog OS Installer to $TAG"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          PR_URL="$(gh pr list --head "$BRANCH" --base main --state open --json url --jq '.[0].url // empty')"
          if [[ -z "$PR_URL" ]]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update SnapDog OS Installer to $TAG" \
              --body "Updates the shared SnapDog OS Installer release metadata after validating every published installer. This PR is generated by the SnapDog OS Installer release workflow.")"
          fi
          gh pr merge "$PR_URL" --auto --squash
