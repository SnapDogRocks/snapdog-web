version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      actions-dependencies:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    target-branch: main
    versioning-strategy: increase
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
